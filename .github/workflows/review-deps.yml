name: Review Dependency Updates

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: review-deps-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-deps:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review dependency update
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "renovate[bot]"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are a dependency update reviewer. Analyze this Renovate PR and assess its impact on the project.

            ## Instructions

            ### Step 1: Gather information
            - Run `gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }}` to get PR details
            - Run `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}` to get the diff
            - Identify which packages are being updated and their version changes (old → new)
            - Focus on `package.json` changes; ignore `pnpm-lock.yaml` details

            ### Step 2: Research updates
            - For each updated package, use WebSearch to find:
              - The changelog or release notes for the new version
              - Any breaking changes
              - Any security advisories or fixes
            - Read relevant source files in the repository to understand how the package is used

            ### Step 3: Assess impact
            Classify the overall impact as one of:
            - **LOW**: Patch updates only, no breaking changes, no significant behavioral changes
            - **MEDIUM**: Minor updates with some API changes, or changes that might affect build/runtime behavior
            - **HIGH**: Major updates, breaking changes, security fixes that require attention, or changes to critical dependencies

            ### Step 4: Submit review
            Read the Markdown template file at `.github/review-templates/review-deps.md` and use it as the EXACT format for your review.
            Fill in each section of the template with the results of your analysis. Do NOT submit plain text — the review MUST be formatted Markdown.

            Write the filled-in review to a temporary file, then submit using `--body-file`:
            ```bash
            # 1. Write the review body to a temp file (using Write tool or bash redirection)
            # 2. Submit the review
            gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --comment --body-file /tmp/review-body.md
            ```

            Always use `--comment`. Do NOT use `--approve` or `--request-changes`.

            Important:
            - MUST read and follow the template in `.github/review-templates/review-deps.md`
            - MUST write the review body to `/tmp/review-body.md` using the Write tool, then pass it via `--body-file`
            - Always provide specific evidence for your impact assessment
            - If you cannot find changelog information, note this and be conservative in your assessment
            - Consider how the package is actually used in this project when assessing impact
            - Write the review body in Japanese
          claude_args: |
            --allowedTools "Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Write,Grep,Glob,WebSearch,WebFetch"

      - name: Clean up previous review artifacts
        if: steps.review.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const cleanup = require('./.github/scripts/cleanup-reviews.js');
            await cleanup({
              github,
              context,
              core,
              summaryMarker: '📦 依存パッケージ更新レビュー',
              resolveThreads: false,
            });
